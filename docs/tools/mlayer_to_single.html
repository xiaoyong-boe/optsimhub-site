<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多层膜 → 单层等效膜 转换计算器</title>
<script src="https://cdn.jsdelivr.net/npm/plotly.js@2.35.2/dist/plotly.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: #f5f6fa; color: #1a1a1a;
  min-height: 100vh;
}
.header {
  background: linear-gradient(135deg, #1e3a5f 0%, #2a5298 100%);
  color: #fff; padding: 14px 24px;
  font-size: 18px; font-weight: 700;
  letter-spacing: 0.5px;
}
.container {
  display: flex; gap: 12px; padding: 12px;
  max-width: 1400px; margin: 0 auto; height: calc(100vh - 64px);
}
/* ── Left Panel ── */
.left { width: 420px; min-width: 380px; display: flex; flex-direction: column; gap: 10px; }
.card {
  background: #fff; border-radius: 8px; padding: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.card h3 {
  font-size: 13px; color: #495057; margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid #e9ecef;
}
/* layer table */
.layer-header { display: flex; gap: 4px; font-size: 11px; color: #868e96; font-weight: 600; margin-bottom: 4px; }
.layer-header span { text-align: center; }
.col-no { width: 40px; }
.col-n { flex: 1; }
.col-d { flex: 1; }
.col-act { width: 90px; }
#layer-list { max-height: 180px; overflow-y: auto; }
.layer-row { display: flex; gap: 4px; align-items: center; margin-bottom: 3px; }
.layer-row .row-no { width: 40px; text-align: center; font-size: 12px; color: #0055aa; font-weight: 600; }
.layer-row input { flex: 1; padding: 5px 6px; border: 1px solid #dee2e6; border-radius: 4px;
  font-size: 13px; text-align: center; font-family: 'Consolas', monospace; }
.layer-row input:focus { outline: none; border-color: #2a5298; box-shadow: 0 0 0 2px rgba(42,82,152,0.15); }
.layer-row .btns { width: 90px; display: flex; gap: 2px; justify-content: center; }
.btn-sm {
  width: 24px; height: 24px; border: 1px solid #dee2e6; background: #f8f9fa;
  border-radius: 4px; cursor: pointer; font-size: 12px; color: #495057;
  display: flex; align-items: center; justify-content: center;
}
.btn-sm:hover { background: #e9ecef; }
.btn-sm.del:hover { background: #fce4ec; color: #d32f2f; border-color: #f8bbd0; }
.btn-row { display: flex; gap: 6px; margin-top: 8px; }
.btn {
  padding: 6px 14px; border: 1px solid #dee2e6; border-radius: 5px;
  background: #f8f9fa; cursor: pointer; font-size: 12px; color: #495057; font-weight: 500;
}
.btn:hover { background: #e9ecef; }
.btn.primary {
  background: #2a5298; color: #fff; border-color: #1e3a5f; font-size: 13px; padding: 8px 20px;
}
.btn.primary:hover { background: #1e3a5f; }
/* method radio */
.method-group { display: flex; flex-direction: column; gap: 4px; }
.method-row { display: flex; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; }
.method-row input[type="radio"] { accent-color: #2a5298; }
.method-params { margin-top: 6px; display: flex; align-items: center; gap: 6px; font-size: 12px; }
.method-params input { width: 60px; padding: 4px 6px; border: 1px solid #dee2e6; border-radius: 4px;
  text-align: center; font-family: 'Consolas', monospace; font-size: 12px; }
.method-params input:focus { outline: none; border-color: #2a5298; }
.desc-box {
  margin-top: 8px; padding: 8px 10px; background: #f8f9fa; border-radius: 5px;
  font-size: 11px; color: #6c757d; line-height: 1.5; white-space: pre-line;
}
.progress-wrap { margin-top: 8px; }
.progress-bar {
  width: 100%; height: 6px; background: #e9ecef; border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #2a5298, #4a90d9);
  width: 0%; transition: width 0.1s;
}
/* ── Right Panel ── */
.right { flex: 1; display: flex; flex-direction: column; gap: 10px; }
.result-header { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.result-item { display: flex; align-items: baseline; gap: 6px; }
.result-label { font-size: 13px; color: #495057; font-family: 'Consolas', monospace; }
.result-value { font-size: 22px; font-weight: 700; color: #d4380d; font-family: 'Consolas', monospace; }
.result-unit { font-size: 12px; color: #868e96; }
.info-lines { margin-top: 8px; }
.info-line { font-size: 12px; color: #6c757d; font-family: 'Consolas', monospace; line-height: 1.8; }
.error-table { margin-top: 10px; }
.error-table h4 { font-size: 12px; color: #495057; margin-bottom: 4px; }
.error-row { display: flex; font-size: 11px; font-family: 'Consolas', monospace; line-height: 1.7; }
.error-hdr { color: #868e96; font-weight: 600; }
.col-th { width: 60px; }
.col-dm { width: 90px; }
.col-de { width: 90px; }
.col-err { flex: 1; }
#plot-area { flex: 1; min-height: 0; border-radius: 8px; overflow: hidden; }
.placeholder {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: #adb5bd; font-size: 14px;
}
</style>
</head>
<body>
<div class="header">多层膜 → 单层等效膜 转换计算器</div>
<div class="container">
  <!-- LEFT -->
  <div class="left">
    <div class="card" style="flex:1; display:flex; flex-direction:column;">
      <h3>膜层参数输入</h3>
      <div class="layer-header">
        <span class="col-no">层号</span><span class="col-n">折射率 nᵢ</span><span class="col-d">厚度 dᵢ (µm)</span><span class="col-act">操作</span>
      </div>
      <div id="layer-list" style="flex:1; min-height:0;"></div>
      <div class="btn-row">
        <button class="btn" onclick="addLayer()">＋ 添加膜层</button>
        <button class="btn" onclick="removeLayer()">－ 移除末层</button>
        <button class="btn" onclick="clearLayers()">清空所有</button>
      </div>
    </div>
    <div class="card">
      <h3>等效方案选择</h3>
      <div class="method-group">
        <label class="method-row"><input type="radio" name="method" value="A" onchange="onMethodChange()">
          A · 光程等效 (厚度加权平均)</label>
        <label class="method-row"><input type="radio" name="method" value="B" onchange="onMethodChange()">
          B · Snell位移等效 (小角近似)</label>
        <label class="method-row"><input type="radio" name="method" value="C" onchange="onMethodChange()">
          C · 参考角度位移等效 (数值解)</label>
        <label class="method-row"><input type="radio" name="method" value="D" onchange="onMethodChange()" checked>
          D · 光线追迹偏折等效 (RMS最优)</label>
      </div>
      <div class="method-params" id="param-c" style="display:none">
        参考入射角 (°): <input id="theta-c" type="number" value="45" step="0.1" min="0.1" max="89.9">
      </div>
      <div class="method-params" id="param-d">
        偏折等效角度范围: <input id="theta-min" type="number" value="1" step="0.1" min="0" max="89"> ° ~
        <input id="theta-max" type="number" value="80" step="0.1" min="0" max="89"> °
        <span style="color:#868e96;font-size:11px;">(RMS位移误差最小化)</span>
      </div>
      <div class="desc-box" id="desc-box">
        d_eq = Σ d_i · sinθ / √(n_eq² − sin²θ)<br>
        → 专为光线追迹偏折等效设计<br>→ 解析最优 d_eq + 扫描最优 n_eq
      </div>
      <div class="progress-wrap" id="progress-wrap" style="display:none">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <button class="btn primary" style="width:100%;margin-top:8px;" id="calc-btn" onclick="calculate()">
        计  算  等  效  膜  层
      </button>
    </div>
  </div>
  <!-- RIGHT -->
  <div class="right">
    <div class="card">
      <h3>计算结果</h3>
      <div class="result-header">
        <div class="result-item">
          <span class="result-label">等效折射率 n_eq =</span>
          <span class="result-value" id="res-n">—</span>
        </div>
        <div class="result-item">
          <span class="result-label">等效厚度 d_eq =</span>
          <span class="result-value" id="res-d">—</span>
          <span class="result-unit">µm</span>
        </div>
      </div>
      <div class="info-lines" id="info-lines"></div>
      <div class="error-table" id="error-table" style="display:none">
        <h4>各角度偏折位移对比:</h4>
        <div class="error-row error-hdr">
          <span class="col-th">角度</span><span class="col-dm">多层位移</span><span class="col-de">等效位移</span><span class="col-err">误差</span>
        </div>
        <div id="error-rows"></div>
      </div>
    </div>
    <div class="card" style="flex:1; display:flex; flex-direction:column;">
      <h3>偏折位移对比图 (方案D)</h3>
      <div id="plot-area" style="flex:1; min-height:0;"></div>
      <div id="plot-placeholder" class="placeholder" style="flex:1;">
        点击"计算等效膜层"查看偏折位移对比图
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 等效算法 (ported from Python)
// ============================================================

function methodAWeightedAvg(layers) {
  const d_eq = layers.reduce((s, l) => s + l.d, 0);
  if (d_eq === 0) return [0, 0];
  const n_eq = layers.reduce((s, l) => s + l.n * l.d, 0) / d_eq;
  return [Math.round(n_eq * 1e6) / 1e6, Math.round(d_eq * 1e3) / 1e3];
}

function methodBSnellSmallAngle(layers) {
  const sum_nd = layers.reduce((s, l) => s + l.n * l.d, 0);
  const sum_dn = layers.reduce((s, l) => l.n > 0 ? s + l.d / l.n : s, 0);
  if (sum_dn <= 0 || sum_nd <= 0) return [0, 0];
  const n_eq = Math.sqrt(sum_nd / sum_dn);
  const d_eq = Math.sqrt(sum_nd * sum_dn);
  return [Math.round(n_eq * 1e6) / 1e6, Math.round(d_eq * 1e3) / 1e3];
}

function methodCRefAngle(layers, thetaDeg) {
  const sin_theta = Math.sin(thetaDeg * Math.PI / 180);
  const sin2 = sin_theta * sin_theta;
  const d_eq = layers.reduce((s, l) => s + l.d, 0);
  if (d_eq <= 0) return [0, 0];
  let D_target = 0;
  for (const l of layers) {
    const denom = Math.sqrt(Math.max(l.n * l.n - sin2, 1e-12));
    D_target += l.d * sin_theta / denom;
  }
  if (D_target <= 0) return [0, 0];
  const ratio = d_eq * sin_theta / D_target;
  const n_eq = Math.sqrt(sin2 + ratio * ratio);
  return [Math.round(n_eq * 1e6) / 1e6, Math.round(d_eq * 1e3) / 1e3];
}

function lateralDisp(n, d, sin2) {
  const denom = Math.sqrt(Math.max(n * n - sin2, 1e-15));
  return d * Math.sqrt(sin2) / denom;
}

function totalDisp(layers, sin2) {
  return layers.reduce((s, l) => s + lateralDisp(l.n, l.d, sin2), 0);
}

function methodDDeflection(layers, thetaMin, thetaMax, numSamples, progressCb) {
  const tMinRad = Math.max(thetaMin, 0.01) * Math.PI / 180;
  const tMaxRad = Math.min(thetaMax, 89.0) * Math.PI / 180;

  const sin2Min = Math.sin(tMinRad) ** 2;
  const sin2Max = Math.sin(tMaxRad) ** 2;

  const sin2Vals = [];
  const sinVals = [];
  for (let i = 0; i < numSamples; i++) {
    const s2 = sin2Min + (sin2Max - sin2Min) * i / (numSamples - 1);
    sin2Vals.push(s2);
    sinVals.push(Math.sqrt(s2));
  }

  const D_targets = sin2Vals.map(s2 => totalDisp(layers, s2));
  const validIdx = [];
  for (let j = 0; j < D_targets.length; j++) {
    if (D_targets[j] > 1e-12) validIdx.push(j);
  }

  if (validIdx.length === 0) {
    const [nb, db] = methodBSnellSmallAngle(layers);
    return { n_eq: nb, d_eq: db, rms_error: 0, max_rel_error: 0, angle_points: [], theta_range: [thetaMin, thetaMax] };
  }

  const sum_d = layers.reduce((s, l) => s + l.d, 0);
  const nVals = layers.map(l => l.n);
  const nMin = Math.min(...nVals) * 0.6;
  const nMax = Math.max(...nVals) * 1.8;

  function optimalD(n_eq) {
    let num = 0, den = 0;
    for (const j of validIdx) {
      const s2 = sin2Vals[j];
      const g = sinVals[j] / Math.sqrt(Math.max(n_eq * n_eq - s2, 1e-15));
      num += D_targets[j] * g;
      den += g * g;
    }
    if (den <= 0) return sum_d;
    return num / den;
  }

  function rmsErrorN(n_eq) {
    const d_eq = optimalD(n_eq);
    let err2 = 0;
    for (const j of validIdx) {
      const s2 = sin2Vals[j];
      const g = sinVals[j] / Math.sqrt(Math.max(n_eq * n_eq - s2, 1e-15));
      const D_eq = d_eq * g;
      err2 += (D_targets[j] - D_eq) ** 2;
    }
    return Math.sqrt(err2 / validIdx.length);
  }

  // Phase 1: coarse scan (synchronous in JS — fast enough)
  let best_n = 0, best_err = Infinity;
  const nGrid = 200;
  for (let i = 0; i < nGrid; i++) {
    const nc = nMin + (nMax - nMin) * i / (nGrid - 1);
    const err = rmsErrorN(nc);
    if (err < best_err) { best_err = err; best_n = nc; }
    if (progressCb && i % 20 === 0) progressCb(i / nGrid * 100);
  }

  // Phase 2: refine 3 rounds
  let span, n_lo, n_hi, step;
  for (let round = 0; round < 3; round++) {
    span = (nMax - nMin) / nGrid * 3;
    n_lo = Math.max(nMin, best_n - span);
    n_hi = Math.min(nMax, best_n + span);
    step = (n_hi - n_lo) / 80;
    for (let nc = n_lo; nc <= n_hi; nc += step) {
      const err = rmsErrorN(nc);
      if (err < best_err) { best_err = err; best_n = nc; }
    }
  }

  let n_eq = best_n;
  let d_eq = optimalD(n_eq);
  if (d_eq <= 0) {
    [n_eq, d_eq] = methodBSnellSmallAngle(layers);
  }

  // angle point details
  const angle_points = [];
  let max_rel_err = 0;
  const ptStep = Math.max(1, Math.floor(numSamples / 10));
  for (let i = 0; i < numSamples; i += ptStep) {
    const s2 = sin2Vals[i];
    const theta = Math.asin(Math.sqrt(s2)) * 180 / Math.PI;
    const D_m = D_targets[i];
    const D_e = lateralDisp(n_eq, d_eq, s2);
    let rel_e = 0;
    if (D_m > 1e-9) rel_e = Math.abs(D_m - D_e) / D_m * 100;
    max_rel_err = Math.max(max_rel_err, rel_e);
    angle_points.push([theta, D_m, D_e, rel_e]);
  }

  return {
    n_eq: Math.round(n_eq * 1e6) / 1e6,
    d_eq: Math.round(d_eq * 1e3) / 1e3,
    rms_error: rmsErrorN(n_eq),
    max_rel_error: max_rel_err,
    angle_points,
    theta_range: [thetaMin, thetaMax],
  };
}

// ============================================================
// Layer Management
// ============================================================

let layerCounter = 0;
const layers = [];  // { n_str, d_str, id }

function createLayerRow(nVal, dVal) {
  const id = ++layerCounter;
  layers.push({ id, n_str: String(nVal), d_str: String(dVal), n_input: null, d_input: null });
  renderLayerRows();
}

function renderLayerRows() {
  const container = document.getElementById('layer-list');
  container.innerHTML = '';
  layers.forEach((l, i) => {
    const div = document.createElement('div');
    div.className = 'layer-row';
    div.innerHTML = `
      <span class="row-no">#${i + 1}</span>
      <input type="number" class="n-inp" value="${l.n_str}" step="0.01" min="0.01" data-id="${l.id}" data-field="n">
      <input type="number" class="d-inp" value="${l.d_str}" step="1" min="0" data-id="${l.id}" data-field="d">
      <div class="btns">
        <button class="btn-sm" title="上移" data-id="${l.id}" data-action="up">&#9650;</button>
        <button class="btn-sm" title="下移" data-id="${l.id}" data-action="down">&#9660;</button>
        <button class="btn-sm del" title="删除" data-id="${l.id}" data-action="del">&#10005;</button>
      </div>`;
    container.appendChild(div);
  });
  // Attach listeners
  container.querySelectorAll('.n-inp, .d-inp').forEach(inp => {
    inp.addEventListener('input', () => {
      const id = parseInt(inp.dataset.id);
      const field = inp.dataset.field;
      const l = layers.find(x => x.id === id);
      if (l) l[field + '_str'] = inp.value;
    });
  });
  container.querySelectorAll('.btn-sm').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      const action = btn.dataset.action;
      const idx = layers.findIndex(x => x.id === id);
      if (idx < 0) return;
      if (action === 'up' && idx > 0) {
        [layers[idx], layers[idx - 1]] = [layers[idx - 1], layers[idx]];
      } else if (action === 'down' && idx < layers.length - 1) {
        [layers[idx], layers[idx + 1]] = [layers[idx + 1], layers[idx]];
      } else if (action === 'del') {
        layers.splice(idx, 1);
        if (layers.length === 0) createLayerRow(1.50, 400);
      }
      renderLayerRows();
    });
  });
}

function addLayer() {
  createLayerRow(1.50, 400);
}

function removeLayer() {
  if (layers.length > 1) {
    layers.pop();
    renderLayerRows();
  } else if (layers.length === 1) {
    layers.pop();
    createLayerRow(1.50, 400);
  }
}

function clearLayers() {
  layers.length = 0;
  createLayerRow(1.50, 400);
  createLayerRow(1.50, 400);
}

function getLayers() {
  const result = [];
  for (const l of layers) {
    const n = parseFloat(l.n_str);
    const d = parseFloat(l.d_str);
    if (isNaN(n) || n <= 0) { alert('折射率必须 > 0 (层 #' + l.id + ')'); return null; }
    if (isNaN(d) || d < 0) { alert('厚度必须 ≥ 0 (层 #' + l.id + ')'); return null; }
    if (d > 0) result.push({ n, d });
  }
  if (result.length === 0) { alert('至少一层厚度 > 0'); return null; }
  return result;
}

// ============================================================
// Method Selection
// ============================================================

const methodDescs = {
  A: 'd_eq = Σ d_i\nn_eq = Σ(n_i·d_i) / Σ d_i\n→ 仅保证垂直入射时光程相等，斜入射偏折误差大',
  B: 'n_eq = √[ Σ(n_i·d_i) / Σ(d_i/n_i) ]\nd_eq = √[ Σ(n_i·d_i) · Σ(d_i/n_i) ]\n→ 小角度下横向位移 + 光程同时等效，简单实用',
  C: 'd_eq = Σ d_i，在指定入射角下反解 n_eq\n→ 单角度精确匹配，其余角度不再相等',
  D: '解析最优 d_eq (线性回归) + 单变量扫描 n_eq\n→ 专为光线追迹偏折等效设计\n→ 在 0°~80° 范围内最小化 RMS 位移误差',
};

function onMethodChange() {
  const method = getMethod();
  document.getElementById('param-c').style.display = method === 'C' ? 'flex' : 'none';
  document.getElementById('param-d').style.display = method === 'D' ? 'flex' : 'none';
  document.getElementById('desc-box').innerHTML = methodDescs[method].replace(/\n/g, '<br>');
}

function getMethod() {
  return document.querySelector('input[name="method"]:checked').value;
}

// ============================================================
// Compute & Display
// ============================================================

function calculate() {
  const layersData = getLayers();
  if (!layersData) return;

  const method = getMethod();
  const btn = document.getElementById('calc-btn');

  if (method !== 'D') {
    let n_eq, d_eq, extra = null;
    if (method === 'A') [n_eq, d_eq] = methodAWeightedAvg(layersData);
    else if (method === 'B') [n_eq, d_eq] = methodBSnellSmallAngle(layersData);
    else if (method === 'C') {
      const theta = parseFloat(document.getElementById('theta-c').value);
      if (isNaN(theta) || theta <= 0 || theta >= 90) { alert('参考入射角必须在 0° 到 90° 之间'); return; }
      [n_eq, d_eq] = methodCRefAngle(layersData, theta);
      extra = { theta_ref: theta };
    }
    showResults(layersData, n_eq, d_eq, method, extra);
    return;
  }

  // Method D
  const tMin = parseFloat(document.getElementById('theta-min').value);
  const tMax = parseFloat(document.getElementById('theta-max').value);
  if (isNaN(tMin) || isNaN(tMax) || tMin < 0 || tMax > 89 || tMin >= tMax) {
    alert('角度范围不合法 (0° ≤ min < max ≤ 89°)'); return;
  }

  btn.textContent = '计算中...';
  btn.disabled = true;
  document.getElementById('res-n').textContent = '...';
  document.getElementById('res-d').textContent = '...';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('progress-fill').style.width = '0%';

  // Use setTimeout to allow UI update, then compute
  setTimeout(() => {
    const result = methodDDeflection(layersData, tMin, tMax, 40,
      (pct) => { document.getElementById('progress-fill').style.width = pct + '%'; }
    );
    document.getElementById('progress-fill').style.width = '100%';
    setTimeout(() => {
      document.getElementById('progress-wrap').style.display = 'none';
      showResults(layersData, result.n_eq, result.d_eq, 'D', result);
      btn.textContent = '计  算  等  效  膜  层';
      btn.disabled = false;
    }, 100);
  }, 50);
}

function showResults(layersData, n_eq, d_eq, method, extra) {
  document.getElementById('res-n').textContent = n_eq.toFixed(4);
  document.getElementById('res-d').textContent = d_eq.toFixed(2);

  const sum_d = layersData.reduce((s, l) => s + l.d, 0);
  const sum_nd = layersData.reduce((s, l) => s + l.n * l.d, 0);
  const sum_dn = layersData.reduce((s, l) => l.n > 0 ? s + l.d / l.n : s, 0);
  const n_avg = sum_d > 0 ? sum_nd / sum_d : 0;

  let lines = [
    `物理总厚度 Σdᵢ = ${sum_d.toFixed(2)} µm`,
    `光程 Σ(nᵢ·dᵢ) = ${sum_nd.toFixed(2)} µm`,
    `Σ(dᵢ/nᵢ) = ${sum_dn.toFixed(4)}`,
    `厚度加权平均折射率 = ${n_avg.toFixed(4)}`,
  ];

  if (method === 'B') {
    lines.push(`验算: d_eq/n_eq = ${(d_eq / n_eq).toFixed(4)}  ≈  Σ(dᵢ/nᵢ) = ${sum_dn.toFixed(4)}`);
    lines.push(`      n_eq·d_eq = ${(n_eq * d_eq).toFixed(2)}  ≈  Σ(nᵢ·dᵢ) = ${sum_nd.toFixed(2)}`);
  } else if (method === 'C') {
    const theta = extra.theta_ref;
    const sin2 = Math.sin(theta * Math.PI / 180) ** 2;
    const D_m = totalDisp(layersData, sin2);
    const D_e = lateralDisp(n_eq, d_eq, sin2);
    lines.push(`θ = ${theta}°  多层位移 = ${D_m.toFixed(4)}  等效位移 = ${D_e.toFixed(4)}`);
    lines.push(`绝对误差 = ${Math.abs(D_m - D_e).toFixed(6)} µm`);
  } else if (method === 'D') {
    lines.push(`RMS位移误差 = ${extra.rms_error.toFixed(4)} µm`);
    lines.push(`最大相对误差 = ${extra.max_rel_error.toFixed(2)}%  (${extra.theta_range[0]}° ~ ${extra.theta_range[1]}°)`);
  }

  document.getElementById('info-lines').innerHTML = lines.map(l => `<div class="info-line">${l}</div>`).join('');

  // Error table (method D)
  const errTable = document.getElementById('error-table');
  const errRows = document.getElementById('error-rows');
  if (method === 'D' && extra.angle_points.length > 0) {
    errTable.style.display = 'block';
    errRows.innerHTML = extra.angle_points.map(([theta, D_m, D_e, rel_e]) => {
      const bar = '\u2588'.repeat(Math.min(Math.floor(rel_e / 3) + 1, 15));
      const color = rel_e > 5 ? '#d4380d' : '#389e0d';
      return `<div class="error-row" style="color:${color}">
        <span class="col-th">${theta.toFixed(1)}</span>
        <span class="col-dm">${D_m.toFixed(3)}</span>
        <span class="col-de">${D_e.toFixed(3)}</span>
        <span class="col-err">${rel_e.toFixed(2)}% ${bar}</span>
      </div>`;
    }).join('');
  } else {
    errTable.style.display = 'none';
  }

  // Plot (method D)
  if (method === 'D' && extra.angle_points.length > 0) {
    drawPlot(extra.angle_points, n_eq, d_eq);
  }
}

function drawPlot(anglePoints, n_eq, d_eq) {
  const thetas = anglePoints.map(p => p[0]);
  const D_ms = anglePoints.map(p => p[1]);
  const D_es = anglePoints.map(p => p[2]);

  const placeholder = document.getElementById('plot-placeholder');
  if (placeholder) placeholder.style.display = 'none';

  const traceMulti = {
    x: thetas, y: D_ms, type: 'scatter', mode: 'lines+markers',
    name: '多层总位移', line: { color: '#2a5298', width: 2 },
    marker: { size: 5, color: '#2a5298' }
  };
  const traceEq = {
    x: thetas, y: D_es, type: 'scatter', mode: 'lines+markers',
    name: `等效单层 (n=${n_eq.toFixed(4)}, d=${d_eq.toFixed(2)}µm)`,
    line: { color: '#d4380d', width: 2, dash: 'dash' },
    marker: { size: 5, color: '#d4380d', symbol: 'diamond' }
  };

  const layout = {
    paper_bgcolor: '#ffffff', plot_bgcolor: '#fafbfc',
    margin: { l: 50, r: 20, t: 10, b: 40 },
    xaxis: { title: '入射角 θ (°)', gridcolor: '#e9ecef', zeroline: false },
    yaxis: { title: '横向位移 D (µm)', gridcolor: '#e9ecef', zeroline: false },
    legend: { x: 0.01, y: 0.99, font: { size: 11 } },
    font: { family: 'Segoe UI, Microsoft YaHei, sans-serif', size: 12, color: '#495057' },
    hovermode: 'x unified',
  };

  const config = { responsive: true, displayModeBar: false };
  Plotly.react('plot-area', [traceMulti, traceEq], layout, config);
}
